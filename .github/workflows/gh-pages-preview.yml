name: GitHub Pages preview

on:
  pull_request:
    branches: [ "master" ]
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: gh-pages-preview
  cancel-in-progress: false

jobs:
  preview:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '2.6.5'
          bundler-cache: true

      - name: Build Jekyll site with GH Pages baseurl
        run: bundle exec jekyll build --baseurl "/living-savior-lutheran-site"

      - name: Add noindex robots.txt
        run: |
          cat <<'EOF' > ./_site/robots.txt
          User-agent: *
          Disallow: /
          EOF

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
          commit_message: "preview: ${{ github.event.pull_request.title || github.ref_name }} (${{ github.sha }})"

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const url = `https://cgallarno.github.io/living-savior-lutheran-site/`;
            const marker = '<!-- gh-pages-preview-comment -->';
            const body = `${marker}\n\n**Preview deployed** \u{1F389}\n\n${url}\n\n_Single-slot preview — the latest PR push overwrites the previous deploy. Updated commit \`${context.sha.substring(0, 7)}\` at ${new Date().toISOString()}._`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
