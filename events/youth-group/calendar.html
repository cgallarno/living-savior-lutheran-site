				<table class="table" id="events">

<style type="text/css">
	.datetime{
		width: 200px;
	}
</style>


<script type="text/javascript">
	const events = [
{ when : 'Friday, December 3 12- 3pm', what: 'Christmas Tree Sales', where: 'Parking Lot', },
{ when : 'Saturday, December 16th', what: 'Babysitting Fundraiser', where: 'Klein Hall', },
{ when : 'TBD (Late Jan, Early Feb)', what: 'Hypothermia Shelter Support', where: 'Klein Hall', },
	]

	$table = $("#events");

	for(event of events){
		$table.append(`<tr><td class="datetime">${event.when}</td><td>${event.what}</td><td>${event.where}</td></tr>`)
	}
</script>
