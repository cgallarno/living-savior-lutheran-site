		<script src="{{ '/js/sermons.js' | prepend: site.baseurl }}"></script>
		<script>
			$(document).ready(function () {
				sermonsRepo.get(5, function (videos) {
					$sermonContainer = $('#sermon-container');
					var embeds = [];
					videos.shift(); // Remove this
					$.each(videos, function (key, video) {
						var dateString = ' / ' + video.date.format('LL');
						var lastClass = key == videos.length - 1 ? 'lasts': '';

						var iframe = $(video.embed.html);
						var embedHtml = iframe.attr('src', iframe.attr('src') + '&title=0&byline=0').prop('outerHTML');

						embeds.push('<div class="sermon-content ' + lastClass + '"><div class="row"><div class="col-md-18"><h4>' + video.title + '</h4><span class="post-meta">'+ video.speaker + ' ' + dateString + ' ' + video.passageString + '</span></div></div><div class="row"><div class="col-md-18 video-container">' + embedHtml + '</div></div>');
					});
					$sermonContainer.html(embeds);
				});
			});
		</script>
{% endunless %}
